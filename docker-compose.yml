version: "3.8"

services:
  mysql-service:
    build:
      context: .
      dockerfile: Dockerfile.mysql

  tomcat:
    image: tomcat:8.5
    depends_on:
      - mysql-service
    ports:
      - "8080:8080"
    volumes:
      - ./app/GadgetHub-Website.war:/usr/local/tomcat/webapps/ROOT.war
    environment:
      DB_HOST: mysql-service
      DB_PORT: 3306
      DB_NAME: gadgethub
      DB_USER: project
      DB_PASSWORD: rayeesali1510
